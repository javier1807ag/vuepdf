<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ver venta nacional</title>
<script src="https://unpkg.com/vue@3"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #fff;
  color: #333;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 18px 22px;
  border-bottom: 1px solid #ddd;
}

.icon-box {
  width: 45px;
  height: 45px;
  background: #eaf1fb;
  color: #104da3;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  font-size: 24px;
}

.container {
  padding: 25px 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 25px;
  margin-bottom: 25px;
}

.field label {
  display: block;
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 8px;
}

.required {
  color: red;
}

input, select, textarea {
  width: 100%;
  box-sizing: border-box;
  padding: 10px 12px;
  border: 1px solid #cfd6df;
  border-radius: 5px;
  background: #f7f8fa;
  font-size: 14px;
}

.comprobante {
  display: grid;
  grid-template-columns: 1fr 35px 1fr;
}

.comprobante span {
  border-top: 1px solid #cfd6df;
  border-bottom: 1px solid #cfd6df;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f7f8fa;
}

.row-full {
  margin-bottom: 35px;
}

hr {
  border: 0;
  border-top: 1px solid #ddd;
  margin: 35px 0;
}

.actions {
  margin-bottom: 25px;
}

button {
  border: none;
  padding: 11px 18px;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
}

.btn-primary {
  background: #174ea6;
  color: white;
}

.btn-secondary {
  background: #8fa8c0;
  color: white;
}

.btn-danger {
  background: #d93025;
  color: white;
}

.product-header {
  display: flex;
  justify-content: space-between;
  align-items: end;
  margin-bottom: 20px;
}

.product-add {
  display: flex;
  gap: 10px;
  align-items: end;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th {
  border-bottom: 2px solid #cfd6df;
  padding: 10px;
  text-align: left;
  color: #000;
}

td {
  border-bottom: 1px solid #e0e0e0;
  padding: 8px;
}

td input, td select, td textarea {
  padding: 8px;
  background: #f2f4f7;
}

td textarea {
  resize: vertical;
  min-height: 38px;
}

.totales {
  width: 360px;
  margin-left: auto;
  margin-top: 18px;
}

.total-row {
  display: grid;
  grid-template-columns: 1fr 180px;
  gap: 15px;
  align-items: center;
  margin-bottom: 8px;
}

.total-row label {
  text-align: right;
  font-size: 13px;
}

.total-row input {
  text-align: right;
}

.error {
  color: red;
  font-weight: bold;
}

.ok {
  color: green;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="app">

  <div class="header">
    <div class="icon-box">🛒</div>
    <h2>Ver venta nacional</h2>
  </div>

  <div class="container">

    <div class="actions">
      <input type="file" accept="application/pdf" @change="seleccionarArchivo" style="width:350px;">
      <button class="btn-primary" @click="subirPDF">Cargar PDF</button>
      <span v-if="cargando">Procesando...</span>
      <span v-if="error" class="error">{{ error }}</span>
      <span v-if="mensaje" class="ok">{{ mensaje }}</span>
    </div>

    <div class="grid">
      <div class="field">
        <label>Mes <span class="required">*</span></label>
        <select v-model="datos.mes">
          <option>Marzo</option>
          <option>Abril</option>
          <option>Mayo</option>
        </select>
      </div>

      <div class="field">
        <label>Año <span class="required">*</span></label>
        <input type="text" v-model="datos.anio">
      </div>

      <div class="field">
        <label>Tipo de comprobante <span class="required">*</span></label>
        <select v-model="datos.tipo_comprobante">
          <option>Factura</option>
          <option>Boleta</option>
        </select>
      </div>

      <div class="field">
        <label>Nro. comprobante <span class="required">*</span></label>
        <div class="comprobante">
          <input type="text" v-model="datos.serie">
          <span>-</span>
          <input type="text" v-model="datos.correlativo">
        </div>
      </div>

      <div class="field">
        <label>Fecha de emisión <span class="required">*</span></label>
        <input type="text" v-model="datos.fecha">
      </div>
    </div>

    <div class="grid">
      <div class="field">
        <label>Moneda <span class="required">*</span></label>
        <select v-model="datos.moneda">
          <option>Soles</option>
          <option>Dólares</option>
        </select>
      </div>

      <div class="field">
        <label>Tipo de cambio</label>
        <input type="text" v-model="datos.tipo_cambio">
      </div>

      <div class="field">
        <label>Mercado destino <span class="required">*</span></label>
        <input type="text" v-model="datos.mercado_destino">
      </div>

      <div class="field">
        <label>Tipo de documento <span class="required">*</span></label>
        <select v-model="datos.tipo_documento">
          <option>RUC</option>
          <option>DNI</option>
        </select>
      </div>

      <div class="field">
        <label>Número <span class="required">*</span></label>
        <input type="text" v-model="datos.ruc_cliente">
      </div>
    </div>

    <div class="row-full field">
      <label>RAZÓN SOCIAL</label>
      <input type="text" v-model="datos.cliente">
    </div>

    <hr>

    <div class="product-header">
      <h3>Productos</h3>

      <div class="product-add">
        <div class="field">
          <label>SELECCIONAR PRODUCTO</label>
          <input type="text" v-model="productoBuscar" placeholder="Buscar producto específico...">
        </div>
        <button class="btn-secondary" @click="agregarFila">+ Agregar</button>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Producto general</th>
          <th>Producto específico</th>
          <th>U. Medida</th>
          <th>Presentación</th>
          <th>Descripción</th>
          <th>Cantidad</th>
          <th>Precio Unitario</th>
          <th>Opciones</th>
        </tr>
      </thead>

      <tbody>
        <tr v-if="detalle.length === 0">
          <td colspan="9">No se encontró detalle.</td>
        </tr>

        <tr v-for="(item, index) in detalle" :key="index">
          <td>{{ index + 1 }}</td>

          <td>
            <input type="text" v-model="detalle[index].producto_general">
          </td>

          <td>
            <input type="text" v-model="detalle[index].producto_especifico">
          </td>

          <td>
            <input type="text" v-model="detalle[index].unidad_medida">
          </td>

          <td>
            <input type="text" v-model="detalle[index].presentacion">
          </td>

          <td>
            <textarea v-model="detalle[index].descripcion"></textarea>
          </td>

          <td>
            <input type="text" v-model="detalle[index].cantidad" @input="calcularTotales">
          </td>

          <td>
            <input type="text" v-model="detalle[index].valor_unitario" @input="calcularTotales">
          </td>

          <td>
            <button class="btn-danger" @click="eliminarFila(index)">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="totales">
      <div class="total-row">
        <label>SubTotal</label>
        <input type="text" v-model="datos.subtotal">
      </div>

      <div class="total-row">
        <label>Exonerado</label>
        <input type="text" v-model="datos.igv">
      </div>

      <div class="total-row">
        <label><b>Total</b></label>
        <input type="text" v-model="datos.total">
      </div>
    </div>

    <hr>

    <h3>Texto leído del PDF</h3>
    <textarea v-model="datos.texto_pdf" rows="8"></textarea>

  </div>
</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      archivo: null,
      cargando: false,
      error: '',
      mensaje: '',
      productoBuscar: '',
      detalle: [],
      datos: {
        mes: '',
        anio: '',
        tipo_comprobante: 'Factura',
        serie: '',
        correlativo: '',
        fecha: '',
        moneda: 'Soles',
        tipo_cambio: '',
        mercado_destino: '',
        tipo_documento: 'RUC',
        ruc_cliente: '',
        cliente: '',
        subtotal: '',
        igv: '',
        total: '',
        texto_pdf: ''
      }
    };
  },

  methods: {
    seleccionarArchivo(event) {
      this.archivo = event.target.files[0];
      this.error = '';
      this.mensaje = '';
    },

    async subirPDF() {
      if (!this.archivo) {
        this.error = 'Selecciona un archivo PDF.';
        return;
      }

      this.cargando = true;
      this.error = '';
      this.mensaje = '';
      this.detalle = [];

      let formData = new FormData();
      formData.append('factura', this.archivo);

      try {
        const res = await fetch('procesar.php', {
          method: 'POST',
          body: formData
        });

        const textoRespuesta = await res.text();
        console.log(textoRespuesta);

        const data = JSON.parse(textoRespuesta);

        if (data.error) {
          this.error = data.mensaje;
          return;
        }

        this.datos = data;
        this.detalle = data.detalle || [];
        this.calcularTotales();
        this.mensaje = 'PDF procesado correctamente.';

      } catch (e) {
        this.error = 'Error al procesar la respuesta del servidor. Revisa la consola.';
        console.error(e);
      } finally {
        this.cargando = false;
      }
    },

    agregarFila() {
      this.detalle.push({
        producto_general: '',
        producto_especifico: this.productoBuscar,
        unidad_medida: '',
        presentacion: '',
        descripcion: '',
        cantidad: '',
        valor_unitario: ''
      });
    },

    eliminarFila(index) {
      this.detalle.splice(index, 1);
      this.calcularTotales();
    },

    calcularTotales() {
      let subtotal = 0;

      this.detalle.forEach(item => {
        let cantidad = parseFloat(String(item.cantidad).replace(',', '.')) || 0;
        let precio = parseFloat(String(item.valor_unitario).replace(',', '.')) || 0;
        subtotal += cantidad * precio;
      });

      this.datos.subtotal = subtotal.toFixed(2);
      this.datos.total = subtotal.toFixed(2);
    }
  }
}).mount('#app');
</script>

</body>
</html>
